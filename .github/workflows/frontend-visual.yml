name: frontend-visual-regression

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-visual.yml"
  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run frontend quality gate
        run: npm run test:ci

      - name: Check if snapshots exist
        id: check_snapshots
        run: |
          if find e2e/specs -type d -name "*-snapshots" -exec find {} -name "*.png" \; 2>/dev/null | grep -q .; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No baseline snapshots found. Run the update-snapshots workflow to generate them."
          fi

      - name: Run visual regression
        if: steps.check_snapshots.outputs.exist == 'true'
        run: npm run test:e2e:ci

  update-snapshots:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Update snapshots
        run: npm run test:e2e:ci -- --update-snapshots || true

      - name: Commit updated snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add e2e/specs/
          git diff --cached --quiet || git commit -m "chore: update visual regression snapshots"
          git push origin HEAD

  mobile-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mobile regression flow
        run: npm run test:mobile:regression
