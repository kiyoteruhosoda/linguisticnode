trigger:
  branches:
    include:
      - main
      - master
      - develop
      - preview
      - production

pr:
  branches:
    include:
      - main
      - master
      - develop

variables:
  pythonVersion: '3.12'
  nodeVersion: '20.x'
  dockerImageName: 'linguisticnode'

stages:
  # ──────────────────────────────────────────
  # Stage 1: Backend (Python / FastAPI)
  # ──────────────────────────────────────────
  - stage: Backend
    displayName: 'Backend CI'
    jobs:
      - job: PythonTest
        displayName: 'Lint & Test (Python)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Setup Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements-dev.txt
            displayName: 'Install dependencies'

          - script: |
              pip install mypy
              mypy app --ignore-missing-imports
            displayName: 'Type check (mypy)'
            continueOnError: true

          - script: |
              pytest --junitxml=reports/pytest.xml --cov=app --cov-report=xml:reports/coverage.xml
            displayName: 'Run pytest'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/pytest.xml'
              testRunTitle: 'Backend Tests'
            displayName: 'Publish test results'

          - task: PublishCodeCoverageResults@2
            condition: always()
            inputs:
              summaryFileLocation: 'reports/coverage.xml'
            displayName: 'Publish coverage'

  # ──────────────────────────────────────────
  # Stage 2: Frontend (React / TypeScript)
  # ──────────────────────────────────────────
  - stage: Frontend
    displayName: 'Frontend CI'
    jobs:
      - job: NodeTest
        displayName: 'Lint, Typecheck & Test (Node)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: npm run lint
            workingDirectory: frontend
            displayName: 'ESLint'

          - script: npm run typecheck
            workingDirectory: frontend
            displayName: 'TypeScript type check'

          - script: npm run test -- --run --reporter=junit --outputFile=../reports/vitest.xml
            workingDirectory: frontend
            displayName: 'Run Vitest'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/vitest.xml'
              testRunTitle: 'Frontend Tests'
            displayName: 'Publish test results'

          - script: npm run build
            workingDirectory: frontend
            displayName: 'Build (vite)'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'frontend/dist'
              artifact: 'frontend-dist'
            displayName: 'Publish frontend artifact'

  # ──────────────────────────────────────────
  # Stage 3: Android (Expo / React Native)
  # ──────────────────────────────────────────
  - stage: Android
    displayName: 'Android CI'
    jobs:
      # ── Job A: TypeScript check ──────────────
      - job: MobileTypecheck
        displayName: 'Typecheck (mobile)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: npx tsc --noEmit
            workingDirectory: frontend/apps/mobile
            displayName: 'TypeScript type check (mobile)'

      # ── Job B: Debug build (production / preview 以外のブランチ) ──
      - job: AndroidDebugBuild
        displayName: 'Debug Build (Android APK)'
        condition: >
          and(
            succeeded(),
            ne(variables['Build.SourceBranchName'], 'production'),
            ne(variables['Build.SourceBranchName'], 'preview'),
            eq(variables['Build.Reason'], 'IndividualCI')
          )
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'
            displayName: 'Setup Java 17'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: |
              npx expo prebuild \
                --platform android \
                --clean \
                --no-install
            workingDirectory: frontend/apps/mobile
            displayName: 'expo prebuild (generate native Android project)'
            env:
              EXPO_PUBLIC_APP_VERSION: $(Build.BuildNumber)
              EXPO_PUBLIC_ANDROID_VERSION_CODE: $(Build.BuildId)
              EXPO_PUBLIC_ANDROID_APPLICATION_ID: com.linguisticnode.app
              EXPO_PUBLIC_GIT_COMMIT: $(Build.SourceVersion)

          - script: |
              ./gradlew assembleDebug
            workingDirectory: frontend/apps/mobile/android
            displayName: 'Gradle assembleDebug (APK)'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'frontend/apps/mobile/android/app/build/outputs/apk/debug'
              artifact: 'android-debug-apk'
            displayName: 'Publish debug APK artifact'

      # ── Job C: Preview build (preview ブランチのみ・署名付き APK) ──
      - job: AndroidPreviewBuild
        displayName: 'Preview Build (Android APK, signed)'
        condition: >
          and(
            succeeded(),
            eq(variables['Build.SourceBranchName'], 'preview'),
            eq(variables['Build.Reason'], 'IndividualCI')
          )
        variables:
          - group: keystore
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'
            displayName: 'Setup Java 17'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: |
              npx expo prebuild \
                --platform android \
                --clean \
                --no-install
            workingDirectory: frontend/apps/mobile
            displayName: 'expo prebuild (generate native Android project)'
            env:
              EXPO_PUBLIC_APP_VERSION: $(Build.BuildNumber)
              EXPO_PUBLIC_ANDROID_VERSION_CODE: $(Build.BuildId)
              EXPO_PUBLIC_ANDROID_APPLICATION_ID: com.linguisticnode.app
              EXPO_PUBLIC_GIT_COMMIT: $(Build.SourceVersion)

          - task: DownloadSecureFile@1
            name: androidKeystore
            inputs:
              secureFile: 'linguisticnode-release.keystore'
            displayName: 'Download release keystore'

          - script: |
              ./gradlew assembleRelease \
                -Pandroid.injected.signing.store.file=$(androidKeystore.secureFilePath) \
                -Pandroid.injected.signing.store.password=$(KEYSTORE_PASSWORD) \
                -Pandroid.injected.signing.key.alias=$(KEY_ALIAS) \
                -Pandroid.injected.signing.key.password=$(KEY_PASSWORD)
            workingDirectory: frontend/apps/mobile/android
            displayName: 'Gradle assembleRelease (signed APK)'
            env:
              KEYSTORE_PASSWORD: $(KEYSTORE_PASSWORD)
              KEY_ALIAS: $(KEY_ALIAS)
              KEY_PASSWORD: $(KEY_PASSWORD)
              NODE_ENV: production
              NODE_PATH: $(Build.SourcesDirectory)/frontend/node_modules

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'frontend/apps/mobile/android/app/build/outputs/apk/release'
              artifact: 'android-preview-apk'
            displayName: 'Publish preview APK artifact'

      # ── Job D: Release build (production ブランチのみ) ──
      - job: AndroidReleaseBuild
        displayName: 'Release Build (Android AAB)'
        # production へのプッシュ時のみ実行
        condition: >
          and(
            succeeded(),
            eq(variables['Build.SourceBranchName'], 'production'),
            eq(variables['Build.Reason'], 'IndividualCI')
          )
        variables:
          - group: keystore
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'
            displayName: 'Setup Java 17'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: |
              npx expo prebuild \
                --platform android \
                --clean \
                --no-install
            workingDirectory: frontend/apps/mobile
            displayName: 'expo prebuild (generate native Android project)'
            env:
              EXPO_PUBLIC_APP_VERSION: $(Build.BuildNumber)
              EXPO_PUBLIC_ANDROID_VERSION_CODE: $(Build.BuildId)
              EXPO_PUBLIC_ANDROID_APPLICATION_ID: com.linguisticnode.app
              EXPO_PUBLIC_GIT_COMMIT: $(Build.SourceVersion)

          # キーストアファイルを Secure Files からダウンロード
          # 事前に Pipelines → Library → Secure files へ keystore を登録してください
          - task: DownloadSecureFile@1
            name: androidKeystore
            inputs:
              secureFile: 'linguisticnode-release.keystore'
            displayName: 'Download release keystore'

          - script: |
              ./gradlew bundleRelease \
                -Pandroid.injected.signing.store.file=$(androidKeystore.secureFilePath) \
                -Pandroid.injected.signing.store.password=$(KEYSTORE_PASSWORD) \
                -Pandroid.injected.signing.key.alias=$(KEY_ALIAS) \
                -Pandroid.injected.signing.key.password=$(KEY_PASSWORD)
            workingDirectory: frontend/apps/mobile/android
            displayName: 'Gradle bundleRelease (AAB)'
            env:
              KEYSTORE_PASSWORD: $(KEYSTORE_PASSWORD)
              KEY_ALIAS: $(KEY_ALIAS)
              KEY_PASSWORD: $(KEY_PASSWORD)
              NODE_ENV: production
              NODE_PATH: $(Build.SourcesDirectory)/frontend/node_modules

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'frontend/apps/mobile/android/app/build/outputs/bundle/release'
              artifact: 'android-aab'
            displayName: 'Publish AAB artifact'

  # ──────────────────────────────────────────
  # Stage 4: Docker build
  # ──────────────────────────────────────────
  - stage: Docker
    displayName: 'Docker Build'
    dependsOn:
      - Backend
      - Frontend
      - Android
    condition: succeeded()
    jobs:
      - job: DockerBuild
        displayName: 'Build Docker image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build image'
            inputs:
              command: build
              dockerfile: 'Dockerfile'
              buildContext: '.'
              tags: |
                $(dockerImageName):$(Build.BuildId)
                $(dockerImageName):latest
