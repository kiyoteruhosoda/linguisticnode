trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - main
      - master
      - develop

variables:
  pythonVersion: '3.12'
  nodeVersion: '20.x'
  dockerImageName: 'linguisticnode'

stages:
  # ──────────────────────────────────────────
  # Stage 1: Backend (Python / FastAPI)
  # ──────────────────────────────────────────
  - stage: Backend
    displayName: 'Backend CI'
    jobs:
      - job: PythonTest
        displayName: 'Lint & Test (Python)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Setup Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements-dev.txt
            displayName: 'Install dependencies'

          - script: |
              pip install mypy
              mypy app --ignore-missing-imports
            displayName: 'Type check (mypy)'
            continueOnError: true

          - script: |
              pytest --junitxml=reports/pytest.xml --cov=app --cov-report=xml:reports/coverage.xml
            displayName: 'Run pytest'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/pytest.xml'
              testRunTitle: 'Backend Tests'
            displayName: 'Publish test results'

          - task: PublishCodeCoverageResults@2
            condition: always()
            inputs:
              summaryFileLocation: 'reports/coverage.xml'
            displayName: 'Publish coverage'

  # ──────────────────────────────────────────
  # Stage 2: Frontend (React / TypeScript)
  # ──────────────────────────────────────────
  - stage: Frontend
    displayName: 'Frontend CI'
    jobs:
      - job: NodeTest
        displayName: 'Lint, Typecheck & Test (Node)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: npm run lint
            workingDirectory: frontend
            displayName: 'ESLint'

          - script: npm run typecheck
            workingDirectory: frontend
            displayName: 'TypeScript type check'

          - script: npm run test -- --run --reporter=junit --outputFile=../reports/vitest.xml
            workingDirectory: frontend
            displayName: 'Run Vitest'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/vitest.xml'
              testRunTitle: 'Frontend Tests'
            displayName: 'Publish test results'

          - script: npm run build
            workingDirectory: frontend
            displayName: 'Build (vite)'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: 'frontend/dist'
              artifact: 'frontend-dist'
            displayName: 'Publish frontend artifact'

  # ──────────────────────────────────────────
  # Stage 3: Android (Expo / React Native)
  # ──────────────────────────────────────────
  - stage: Android
    displayName: 'Android CI'
    jobs:
      # ── Job A: TypeScript check ──────────────
      - job: MobileTypecheck
        displayName: 'Typecheck (mobile)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: npx tsc --noEmit
            workingDirectory: frontend/apps/mobile
            displayName: 'TypeScript type check (mobile)'

      # ── Job B: EAS Android build (main/master only) ──
      - job: EASAndroidBuild
        displayName: 'EAS Build (Android AAB)'
        # EAS build は main/master へのプッシュ時のみ実行
        condition: >
          and(
            succeeded(),
            in(variables['Build.SourceBranchName'], 'main', 'master'),
            eq(variables['Build.Reason'], 'IndividualCI')
          )
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'Install npm dependencies'

          - script: npm install -g eas-cli
            displayName: 'Install EAS CLI'

          # EXPO_TOKEN は Azure DevOps の Secret 変数として設定してください
          # (Pipelines → Edit → Variables → EXPO_TOKEN を追加)
          - script: |
              eas build \
                --platform android \
                --profile production \
                --non-interactive \
                --no-wait
            workingDirectory: frontend/apps/mobile
            displayName: 'EAS build (Android production AAB)'
            env:
              EXPO_TOKEN: $(EXPO_TOKEN)
              EXPO_PUBLIC_APP_VERSION: $(Build.BuildNumber)
              EXPO_PUBLIC_ANDROID_VERSION_CODE: $(Build.BuildId)

  # ──────────────────────────────────────────
  # Stage 4: Docker build
  # ──────────────────────────────────────────
  - stage: Docker
    displayName: 'Docker Build'
    dependsOn:
      - Backend
      - Frontend
      - Android
    condition: succeeded()
    jobs:
      - job: DockerBuild
        displayName: 'Build Docker image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build image'
            inputs:
              command: build
              dockerfile: 'Dockerfile'
              buildContext: '.'
              tags: |
                $(dockerImageName):$(Build.BuildId)
                $(dockerImageName):latest
